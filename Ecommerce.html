<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NIXIE BOUTIQUE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
url('https://i.pinimg.com/736x/96/a9/b9/96a9b9dfa345bdaceccd7e48a1414b29.jpg');
background-size: cover;
background-position: center;
background-repeat: no-repeat;
background-attachment: fixed;
}

nav{
display:flex;
justify-content:space-between;
padding:15px 25px;
background:rgba(235, 220, 190, 0.92);
backdrop-filter:blur(10px);
position:sticky;
top:0;
box-shadow:0 0 25px rgba(212,106,165,0.2);
}

.logo{
font-size:26px;
font-weight:700;
color:#8a735a;
text-shadow:0 0 10px #e0ceba;	
}

nav a{

margin:0 8px;

cursor:pointer;

text-decoration:none;

color:#5C4634;

transition:0.3s;

}

nav a:hover {

  color: #D4AF37;

}

.cart-icon{

position:relative;

display:inline-block;

font-size:22px;

cursor:pointer;

padding:5px 10px;

transition:0.3s;

}

.cart-icon:hover{transform:scale(1.1);}

.badge{

position:absolute;

top:-5px;

right:-5px;

background:red;

color:white;

font-size:12px;

width:18px;

height:18px;

display:flex;

align-items:center;

justify-content:center;

border-radius:50%;

box-shadow:0 0 8px rgba(255,0,0,0.6);

font-weight:bold;

}

.categories{text-align:center;padding:15px;}

.categories button{

margin:5px;

padding:10px 15px;

border:none;

border-radius:20px;

background:linear-gradient(135deg,#c9b28f,#9e8764);

color:white;

cursor:pointer;

box-shadow:0 0 10px rgba(87, 73, 51);

transition:0.3s;

}

.categories button:hover{
transform:scale(1.1);
box-shadow:0 0 18px rgba(245, 226, 193);}

.container{

display:grid;

grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));

gap:18px;

padding:20px 15px;

}
.card{
    background:rgba(230, 212, 184, 0.95);
    border-radius:16px;
    padding:15px;
    text-align:center;
    transition:0.3s;
    box-shadow:0 4px 12px rgba(143, 121, 84, 0.25);
    display:flex;
    flex-direction:column;
    height:420px;  /* Fixed height */
    position:relative;
    overflow:hidden;
    justify-content: space-between;  /* Distributes content evenly */
}

.card img {
    width:100%;
    height:200px;  /* Fixed image height */
    object-fit:cover;  /* Makes all images perfectly uniform */
    border-radius:12px;
    margin-bottom:12px;
    position:relative;
    z-index:1;
}

.card h4 {
    min-height:60px;  /* Fixed height for titles */
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 0 12px 0;
    line-height:1.3;
    font-size:16px;
    padding:0 8px;
    overflow:hidden;
    text-overflow:ellipsis;
    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
}

.card .price {
    color:#705d3d;
    font-weight:700;
    font-size:22px;
    margin:8px 0 20px 0;
    position:relative;
    z-index:1;
}

.card-buttons {
    display:flex;
    gap:8px;
    margin-top:auto;  /* Pushes buttons to bottom */
}

.card-buttons button {
    flex:1;
    padding:10px 12px;
    border:none;
    border-radius:8px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.card-buttons button:nth-child(1) {
    background:linear-gradient(135deg, #C8AD7F, #a1875d);
    color:#3F2A1E;
}

.card-buttons button:nth-child(2) {
    background:linear-gradient(135deg, #b59679, #755f4b);
    color:white;
}

.card-buttons button:hover {
    transform:translateY(-2px);
    box-shadow:0 6px 15px rgba(0,0,0,0.2);
}


.sizes {

font-size:13px;

color:#635444;

font-weight:600;

margin: 4px 0 8px 0;

}

.price{

color:#705d3d;

font-weight:700;

font-size:20px;

margin:10px 0 19px 0;

}

.page{display:none}

.active{display:block}

.box{

background:rgba(245, 237, 228, 0.92);

margin:100px;

padding:10px;

border-radius:18px;

box-shadow:0 0 20px rgba(255,105,180,0.15);

}

input,select{

display:block;width:50%;

padding:10px;

margin:8px auto;

border-radius:10px;

border:1px solid #a1875d;

}

button{

padding:10px 15px;

border:none;

border-radius:10px;

background:#C8AD7F;

color:#3F2A1E;

font-weight:600;

box-shadow:0 4px 12px rgba(212,175,55,0.25);

transition:all 0.3s;

}

button:hover{

background:#C8AD7F;

transform:translateY(-2px);

box-shadow:0 8px 20px rgba(212,175,55,0.4);

}

.qty-controls{

display:flex;

justify-content:center;

align-items:center;

gap:10px;

margin:5px 0;

}

.qty-controls button{

padding:5px 10px;

border-radius:6px;

}
#loginPage {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

.login-box {
    background: rgba(255, 248, 240, 0.97);
    padding: 50px 60px;     /* slim padding */
    border-radius: 20px;
    box-shadow: 0 20px 45px rgba(0,0,0,0.25);
    text-align: center;
    max-width: 600px;      
    width: 80%;
}

#product .box {
    background: rgba(245, 237, 228, 0.95);
    margin: 30px auto;
    padding: 40px 30px;
    border-radius: 24px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    text-align: left;
}

#checkout h3, #checkout h2 {
    margin: 8px 0;
}

#payment .box {
    background: rgba(245, 237, 228, 0.97);
    padding: 40px 35px;
    border-radius: 24px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    margin: 40px auto;
    max-width: 520px;
}

#payment label {
    color: #5C4634;
    font-weight: 600;
}

#payment input, #payment select {
    display: block;
    width: 100%;
    padding: 14px 16px;
    border: 1px solid #d4c3a9;
    border-radius: 12px;
    font-size: 16px;
    background: white;
}

#payment button {
    background: #C48B9F;
    color: white;
    font-weight: 600;
    transition: all 0.3s;
}

#payment button:hover {
    background: #b36d85;
    transform: translateY(-3px);
}


</style>

<body>

<div id="loginPage" class="active">
    <div class="login-box">
        <h2 style="color:#4d3e27; 
                   text-shadow: 0 0 15px rgba(232, 215, 172); 
                   font-size: 31px; 
                   margin-bottom: 40px;">
            LOGIN TO NIXIE BOUTIQUE
        </h2>
        
        <input id="email" placeholder="Email" 
               style="width:100%; padding:16px 18px; margin:14px 0; 
                      border-radius:12px; border:1px solid #d4c3a9; font-size:17px;">
        
        <input id="pass" type="password" placeholder="Password" 
               style="width:100%; padding:16px 18px; margin:14px 0; 
                      border-radius:12px; border:1px solid #d4c3a9; font-size:17px;">
        
        <button onclick="login()" 
                style="width:100%; padding:16px; margin-top:30px; font-size:18px;">
            Login
        </button>
    </div>
</div>

<div id="app" style="display:none">
<nav>
<div class="logo">NIXIE BOUTIQUE</div>
<div>
<a onclick="show('home')">Shop</a>
<a onclick="show('checkout')" class="cart-icon">🛒<span id="cartCount" class="badge">0</span></a>
</div>
</nav>

<div style="text-align:center;padding-top:15px;">
<input id="searchInput" onkeyup="searchProducts()" placeholder="Search products" style="width:60%;max-width:400px;">

</div>
<div class="categories">
<button onclick="filter('all')">All</button>
<button onclick="filter('tops')">Tops</button>
<button onclick="filter('pants')">Pants</button>
<button onclick="filter('skirts')">Skirts</button>
<button onclick="filter('jackets')">Jackets</button>
<button onclick="filter('dresses')">Dresses</button>
</div>

<div style="text-align:center; margin:15px 0 10px 0;">
<select id="sortSelect" onchange="sortProducts()" style="padding:10px 15px; border-radius:10px; border:1px solid #a1875d; font-size:15px;">
<option value="default">Sort by Default</option>
<option value="low">Price: Low to High</option>
<option value="high">Price: High to Low</option>
</select>
</div>

<div id="home" class="active page">
    <div class="container" id="products"></div>
</div>


<div id="product" class="page">
    <div class="box" style="max-width: 900px; margin: 30px auto;">
        <button onclick="show('home')" style="margin-bottom:20px; padding:10px 20px;">← Back to Shop</button>
        
        <div style="display: flex; gap: 50px; align-items: center; justify-content: center; flex-wrap: wrap;">
            
            
            <div style="flex: 1; text-align: center; min-width: 280px;">
                <img id="pimg" style="width:100%; max-width: 380px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.15);">
            </div>
            
            <div style="flex: 1; min-width: 300px; text-align: left;">
                <h2 id="pname" style="margin: 0 0 15px 0; color: #3F2A1E;"></h2>
                <p id="pdesc" style="color:#666; line-height:1.7; margin-bottom:20px;"></p>
                <p id="psizes" style="color:#665644; font-weight:600; margin:15px 0;"></p>
                <p id="pprice" style="font-size:28px; font-weight:700; color:#C48B9F; margin:20px 0;"></p>
                
                <button onclick="addCart()" style="width:100%; max-width:320px; padding:16px; font-size:17px;">
                    Add to Cart
                </button>
            </div>		
        </div>
    </div>
</div>

<div id="checkout" class="page">
    <h2 style="text-align:center; color:#C48B9F; margin-bottom:25px;">Checkout</h2>
    
    <div class="box" id="cartBox"></div>
    
    <div class="box" style="text-align:center">
        <h3>Promo Code</h3>
        <input id="promoInput" placeholder="Enter Promo Code">
        <button onclick="applyPromo()">Apply Promo</button>
        <p id="promoText"></p>
    </div>

    <div class="box" style="text-align:center; background:rgba(245, 237, 228, 0.97);">
        <h3 id="subtotal"></h3>
        <h3 id="delivery"></h3>
        <h2 id="total" style="color:#C48B9F;"></h2>
        
        <button onclick="show('payment')" style="width:100%; max-width:400px; padding:16px; font-size:18px; margin-top:20px;">
            Proceed to Payment
        </button>
    </div>
</div>

<div id="payment" class="page">
    <div class="box" style="max-width: 500px; margin: 40px auto;">
        <h2 style="text-align:center; color:#C48B9F; margin-bottom:30px;">Payment</h2>
        
        <label style="display:block; margin:15px 0 8px; font-weight:600;">Payment Method</label>
        <select id="method" style="width:100%; padding:14px; margin-bottom:20px; border-radius:12px;">
            <option>GCash</option>
            <option>PayPal</option>
            <option>Cash on Delivery</option>
        </select>
        
        <label style="display:block; margin:15px 0 8px; font-weight:600;">Full Name</label>
        <input id="name" placeholder="Enter Full Name" style="width:100%; padding:14px; margin-bottom:20px; border-radius:12px;">
        
        <label style="display:block; margin:15px 0 8px; font-weight:600;">Delivery Address</label>
        <input id="address" placeholder="Enter Complete Address" style="width:100%; padding:14px; margin-bottom:30px; border-radius:12px;">
        
        <button onclick="placeOrder()" style="width:100%; padding:16px; font-size:18px;">
            Place Order
        </button>
    </div>
</div>


<div id="receipt" class="page">
    <div class="box" style="max-width: 500px; margin: 50px auto; text-align:center;">
        <h2 style="color:#C48B9F; font-size:32px;">Order Confirmed</h2>
        <p style="font-size:18px; margin:20px 0;">Thank you for your order!</p>
        <div style="background:white; padding:20px; border-radius:15px; margin:25px 0;">
            <p id="orderInfo" style="font-size:17px;"></p>
            <p id="tracking" style="color:#C48B9F; font-weight:600; font-size:17px;"></p>
        </div>
        <button onclick="backToShop()" style="padding:14px 40px; font-size:17px;">Back to Shop</button>
    </div>
  </div>
</div>

<script>

function login(){
    const email = document.getElementById('email').value;
    const pass = document.getElementById('pass').value;
    
    if(email === "" || pass === "") {
        return alert('Please fill up email and password');
    }

    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    
    show('home');
    render();        
    updateCartCount();
}

const base=[];
function fill(cat, minPrice, maxPrice){
let arr = items[cat];
for(let i = 0; i < arr.length; i++){
let priceRange = maxPrice - minPrice;
let price = minPrice + Math.floor(Math.random() * (priceRange + 1));

base.push({
id: base.length + 1,
name: arr[i].name,
price: price,
category: cat,
img: arr[i].img
});	
}

}

fill("tops", 350, 500);
fill("pants", 450, 1000);
fill("skirts", 500, 1000);
fill("jackets", 700, 3500);
fill("dresses", 3800, 6500);

let cart=JSON.parse(localStorage.getItem('cart'))||[];
let current;
let promoDiscount=0;
let promoName='';
function sortProducts(){
let sortType = document.getElementById('sortSelect').value;
let sortedList = [...base];
if(sortType === "low"){
sortedList.sort((a, b) => a.price - b.price);
}

else if(sortType === "high"){
sortedList.sort((a, b) => b.price - a.price);
}
render(sortedList);
}

function render(list=base){
    let box = document.getElementById('products');
    box.innerHTML = '';
    
    list.forEach(p => {
        box.innerHTML += `
        <div class='card'>

            <img src='${p.img}'>

            <h4>${p.name}</h4>

            <p class='price'>₱${p.price}</p>

            <div class='card-buttons'>
                <button onclick='openProduct(${p.id})'>
                    View
                </button>
                
                <button onclick='addToCartDirect(${p.id})'>
                    Add to Cart
                </button>
            </div>

        </div>`;
    });

    updateCartCount();
}

function backToShop(){
cart = [];
localStorage.removeItem('cart');
show('home');
render();
}

function updateCartCount(){
document.getElementById('cartCount').innerText =
cart.reduce((sum, item) => sum + item.qty, 0);

}

function filter(t){
let filtered;
if(t === 'all') filtered = [...base];
else filtered = base.filter(p => p.category === t);

render(filtered);
}

function searchProducts(){
let value = document.getElementById('searchInput').value.toLowerCase();
let filtered = base.filter(p => p.name.toLowerCase().includes(value));
render(filtered);
}

function openProduct(id){
current = base.find(p => p.id == id);
document.getElementById('pimg').src = current.img;
document.getElementById('pname').innerText = current.name;
document.getElementById('pdesc').innerText = 'Made with premium fabric';
document.getElementById('psizes').innerText = 'Available Sizes: XS • S • M • L • XL';
document.getElementById('pprice').innerText = '₱' + current.price;
show('product');
}

function addToCartDirect(id){
    let product = base.find(p => p.id == id);
    if(!product) return;
    
    let existing = cart.find(item => item.id == id);
    if(existing){
        existing.qty++;
    } else {
        cart.push({...product, qty: 1});
    }
    
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
    alert(`${product.name} added to cart!`);
}

function changeQty(id,delta){
let item=cart.find(c=>c.id==id);
if(!item) return;
item.qty+=delta;
if(item.qty<=0) cart=cart.filter(c=>c.id!=id);
localStorage.setItem('cart',JSON.stringify(cart));
loadCart();
render();
}

function show(p){
    document.querySelectorAll('.page').forEach(e => {
        e.classList.remove('active');
        e.style.display = 'none';
    });
    
    const page = document.getElementById(p);
    if(page){
        page.classList.add('active');
        page.style.display = 'block';
    }
    
    if(p === 'home'){
        render();          
    }
    if(p === 'checkout'){
        loadCart();
    }
}

function loadCart(){
let box = document.getElementById('cartBox');
box.innerHTML = '';
let total = 0;
cart.forEach(i => {
total += i.price * i.qty;
box.innerHTML += `
<p>${i.name}</p>
<div class='qty-controls'>
<button onclick='changeQty(${i.id},-1)'>-</button>
<span>${i.qty}</span>
<button onclick='changeQty(${i.id},1)'>+</button>
</div>
<p>₱${i.price * i.qty}</p>
<hr>`;
});

let deliveryFee = total >= 100 ? 0 : 5;
let finalTotal = total + deliveryFee;
document.getElementById('subtotal').innerText = 'Subtotal: ₱' + total;
document.getElementById('delivery').innerText = 'Delivery Fee: ₱' + deliveryFee;
document.getElementById('total').innerText = 'Total: ₱' + finalTotal;
updateCartCount();
}

function applyPromo(){
alert("Promo unchanged");
}
function placeOrder(){
    let name = document.getElementById('name').value.trim();
    if(name === ""){
        alert("Please enter your Full Name");
        return;
    }

    let track = 'NIX' + Math.floor(Math.random()*900000 + 100000);
    let method = document.getElementById('method').value;

    // Clear cart
    cart = [];
    localStorage.removeItem('cart');

    // Show receipt
    document.getElementById('orderInfo').innerHTML = `Thank you <strong>${name}</strong>!<br>Your order has been placed.`;
    document.getElementById('tracking').innerText = `Tracking Number: ${track}`;

    show('receipt');
    updateCartCount();
}
</script>
